<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn AI Comment Copilot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#0A66C2"/>
        </svg>
        <h1>AI Comment Copilot</h1>
      </div>
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span class="status-text">Connected</span>
      </div>
    </header>

    <div class="tone-selector">
      <label for="tone">Comment Tone</label>
      <select id="tone">
        <option value="professional">Professional</option>
        <option value="technical">Technical</option>
        <option value="supportive">Supportive</option>
        <option value="networking">Networking</option>
        <option value="thoughtful">Thoughtful</option>
        <option value="friendly">Friendly</option>
        <option value="encouraging">Encouraging</option>
        <option value="curious">Curious</option>
        <option value="founder">Founder</option>
        <option value="recruiter">Recruiter</option>
      </select>
    </div>

    <div class="comment-section">
      <label>Generated Comment</label>
      <div class="comment-box" id="commentBox">
        <p class="placeholder" id="placeholder">Click "Generate AI Comment" on any LinkedIn post to get started...</p>
        <p class="comment-text" id="commentText"></p>
      </div>
      <div class="comment-actions" id="commentActions" style="display: none;">
        <button class="btn btn-copy" id="btnCopy" title="Copy to clipboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copy
        </button>
        <button class="btn btn-regenerate" id="btnRegenerate" title="Generate another">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          Regenerate
        </button>
        <button class="btn btn-insert" id="btnInsert" title="Insert into LinkedIn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          Insert
        </button>
      </div>
    </div>

    <div class="footer">
      <span class="version">v1.0.0</span>
      <a href="#" id="settingsLink">Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
